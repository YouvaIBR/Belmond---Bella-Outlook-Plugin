<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bella — Draft Reply</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <script
      type="text/javascript"
      src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"
    ></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --white:     #FFFFFF;
        --surface:   #F4F3F1;
        --border:    #E8E6E2;
        --ink:       #111110;
        --ink-mid:   #3D3C3A;
        --ink-soft:  #7C7A76;
        --gold:      #9C7E3A;
        --error-bg:  #FEF7F6;
        --error-line:#D4877A;
        --error-text:#5C2A20;
        --f-display: 'DM Serif Display', Georgia, serif;
        --f-body:    'DM Sans', system-ui, sans-serif;
      }

      html, body {
        width: 100%; height: 100%;
        background: var(--white);
        color: var(--ink-mid);
        font-family: var(--f-body);
        font-size: 13px;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
      }

      .layout {
        display: flex;
        flex-direction: column;
        height: 100vh;
        padding: 16px;
        gap: 12px;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }

      .title {
        font-family: var(--f-display);
        font-size: 18px;
        color: var(--ink);
      }

      .subtitle {
        font-size: 11px;
        color: var(--ink-soft);
        margin-top: 1px;
      }

      .editor {
        flex: 1;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 12px;
        overflow-y: auto;
        outline: none;
        font-family: var(--f-body);
        font-size: 13px;
        line-height: 1.6;
        color: var(--ink-mid);
        background: var(--white);
      }

      .editor:focus {
        border-color: var(--gold);
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-shrink: 0;
      }

      .btn {
        flex: 1;
        padding: 9px 12px;
        border: none;
        border-radius: 3px;
        font-family: var(--f-body);
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.15s;
      }

      .btn:hover { opacity: 0.85; }
      .btn:active { opacity: 0.7; }

      .btn-primary {
        background: var(--ink);
        color: var(--white);
      }

      .btn-secondary {
        background: var(--surface);
        color: var(--ink-mid);
        border: 1px solid var(--border);
      }

      .toast {
        position: fixed;
        bottom: 72px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--ink);
        color: var(--white);
        font-size: 12px;
        padding: 6px 14px;
        border-radius: 20px;
        opacity: 0;
        transition: opacity 0.2s;
        pointer-events: none;
        white-space: nowrap;
      }

      .toast.show { opacity: 1; }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="header">
        <div>
          <div class="title">Bella</div>
          <div class="subtitle">Review and edit the draft reply</div>
        </div>
      </div>

      <div
        id="editor"
        class="editor"
        contenteditable="true"
        aria-label="Draft reply (editable)"
      ></div>

      <div class="actions">
        <button id="copy-btn" type="button" class="btn btn-secondary">Copy</button>
        <button id="close-btn" type="button" class="btn btn-primary">Close</button>
      </div>
    </div>

    <div id="toast" class="toast">Copied to clipboard</div>

    <script type="module" src="/src/dialog/dialog.ts"></script>
  </body>
</html>
