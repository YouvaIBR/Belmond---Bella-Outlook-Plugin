image: node:20

stages:
  - install
  - verify
  - build
  - deploy

default:
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
    policy: pull

install:
  stage: install
  script:
    - npm ci
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
    policy: pull-push
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

lint:
  stage: verify
  needs: [install]
  script:
    - npm run lint

test:
  stage: verify
  needs: [install]
  script:
    - npm test

build:
  stage: build
  needs: [install, lint, test]
  variables:
    VITE_CLIENT_ID: $VITE_CLIENT_ID
    VITE_TENANT_ID: $VITE_TENANT_ID
    VITE_N8N_WEBHOOK_URL: $VITE_N8N_WEBHOOK_URL
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day

deploy:firebase-hosting:prod:
  stage: deploy
  image: node:20
  needs: [build]
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: $GCP_WIF_PROVIDER_URL
  before_script:
    - apt-get update && apt-get install -y curl jq
    - npm install -g firebase-tools
  script:
    # Exchange GitLab OIDC token for a GCP federated token via STS
    - |
      FEDERATED_TOKEN="$(curl --fail -s "https://sts.googleapis.com/v1/token" \
        --header "Content-Type: application/json" \
        --data "{
          \"audience\": \"//iam.googleapis.com/$GCP_WIF_PROVIDER_PATH\",
          \"grantType\": \"urn:ietf:params:oauth:grant-type:token-exchange\",
          \"requestedTokenType\": \"urn:ietf:params:oauth:token-type:access_token\",
          \"scope\": \"https://www.googleapis.com/auth/cloud-platform\",
          \"subjectTokenType\": \"urn:ietf:params:oauth:token-type:jwt\",
          \"subjectToken\": \"${GITLAB_OIDC_TOKEN}\"
        }" | jq -r '.access_token')"
    # Impersonate the service account to get a short-lived access token
    - |
      ACCESS_TOKEN="$(curl --fail -s "https://iamcredentials.googleapis.com/v1/projects/-/serviceAccounts/$GCP_SERVICE_ACCOUNT:generateAccessToken" \
        --header "Authorization: Bearer ${FEDERATED_TOKEN}" \
        --header "Content-Type: application/json" \
        --data '{"scope": ["https://www.googleapis.com/auth/cloud-platform"]}' \
        | jq -r '.accessToken')"
    # Deploy — firebase-tools picks up the token via CLOUDSDK_AUTH_ACCESS_TOKEN
    - CLOUDSDK_AUTH_ACCESS_TOKEN="$ACCESS_TOKEN" firebase deploy --only hosting --project "$FIREBASE_PROJECT_ID" --non-interactive
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
