<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <title>Bella — Belmond Assistant</title>

    <!-- Dev mock: define Office + msal BEFORE office.js loads so the CDN stub can't replace them -->
    <script>
      window.Office = {
        onReady: (cb) => setTimeout(() => cb({ host: "Outlook" }), 0),
        context: {
          mailbox: {
            item: {
              subject: "Room Availability Inquiry & Boat Rental – July 2026",
              from: { emailAddress: "sarah.thompson@gmail.com" },
              body: {
                getAsync: (_, cb) =>
                  cb({
                    status: "succeeded",
                    value:
                      "Dear La Residencia Team,I hope this message finds you well. I am writing to inquire about availability at your property for an upcoming trip to Mallorca.We are a group of 2 adults looking to stay at La Residencia from July 14 to July 21, 2026 (7 nights). Could you please let us know if you have any rooms or suites available during that period, along with the current rates?Additionally, I would love to know whether it is possible to arrange a private boat rental through the hotel, either for a half-day or full-day excursion along the coast. If so, could you provide details on the options available, pricing, and whether a captain/crew is included?We would very much appreciate any information you can share, and we look forward to hearing from you.Warm regards,Sarah Thompson +1 (917) 555-0284 sarah.thompson@gmail.com",
                  }),
                setAsync: (_, __, cb) => cb && cb({ status: "succeeded" }),
              },
            },
          },
        },
        HostType: { Outlook: "Outlook" },
        AsyncResultStatus: { Failed: "failed" },
        CoercionType: { Text: "text" },
      };
      window.msal = {
        createNestablePublicClientApplication: async () => ({
          getAllAccounts: () => [],
          acquireTokenSilent: async () => ({ accessToken: "mock" }),
        }),
      };
    </script>

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <h1>Bella</h1>
        <p>Belmond Assistant</p>
      </div>
    </header>

    <main class="content">
      <!-- Auth loading state (shown while checking Azure AD group membership) -->
      <div
        id="auth-loading"
        class="loading"
        role="status"
        aria-live="polite"
        style="display: none"
      >
        <div class="spinner" aria-hidden="true"></div>
        <span>Checking access…</span>
      </div>

      <!-- Access denied state -->
      <div id="access-denied" class="error" role="alert" style="display: none">
        <strong>Access denied</strong>
        <span class="access-denied-message"></span>
      </div>

      <!-- Main panel — hidden until access control passes -->
      <div id="main-panel" style="display: none">
        <button id="btn-generate" class="btn-primary">
          ✦ Generate a reply
        </button>

        <!-- Loading -->
        <div id="loading" class="loading" role="status" aria-live="polite">
          <div class="spinner" aria-hidden="true"></div>
          <span>Bella is thinking…</span>
        </div>

        <!-- Error -->
        <div id="error" class="error" role="alert" aria-live="assertive">
          <strong>An error occurred</strong>
          <span id="error-message"></span>
        </div>

        <!-- Result -->
        <div id="result" class="result">
          <!-- Email draft preview -->
          <p class="result-label">Draft</p>
          <div
            id="draft-preview"
            class="draft-preview"
            contenteditable="true"
            aria-label="Reply draft generated by Bella"
          ></div>

          <!-- Hidden textarea used only for insertion into Outlook -->
          <textarea
            id="draft-text"
            aria-hidden="true"
            style="display: none"
          ></textarea>

          <div class="divider"></div>

          <button id="btn-insert" class="btn-primary">
            ↳ Insert into reply
          </button>

          <button id="btn-regenerate" class="btn-secondary">
            ↺ Regenerate
          </button>
        </div>
      </div>
    </main>

    <footer class="footer">Powered by Bella · Belmond</footer>
    <script src="app.js"></script>
  </body>
</html>
