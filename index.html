<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <title>Bella — Belmond Assistant</title>

  <!-- Office.js doit être chargé en premier, depuis le CDN officiel Microsoft -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="header">
    <h1>Bella</h1>
    <p>Belmond Assistant</p>
  </header>

  <main class="content">

    <button id="btn-generate" class="btn-primary">
      ✦ Generate a reply
    </button>

    <!-- Loading -->
    <div id="loading" class="loading" role="status" aria-live="polite">
      <div class="spinner" aria-hidden="true"></div>
      <span>Bella is thinking…</span>
    </div>

    <!-- Error -->
    <div id="error" class="error" role="alert" aria-live="assertive">
      <strong>An error occurred</strong>
      <span id="error-message"></span>
    </div>

    <!-- Result -->
    <div id="result" class="result">
      <p class="result-label">Generated draft</p>
      <textarea
        id="draft-text"
        aria-label="Reply draft generated by Bella"
        placeholder="The draft will appear here…"
      ></textarea>

      <div class="divider"></div>

      <button id="btn-insert" class="btn-primary">
        ↳ Insert into reply
      </button>

      <button id="btn-regenerate" class="btn-secondary">
        ↺ Regenerate
      </button>
    </div>

  </main>

  <footer class="footer">
    Powered by Bella · Belmond
  </footer>

  <script src="app.js"></script>
</body>
</html>
